<!DOCTYPE html>
<html>
<head>
  <title>Offerte Generator</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 40px;
    }

    h1 {
      font-size: 40px;
    }

    input, select, button {
      padding: 10px;
      margin-top: 10px;
      width: 260px;
      display: block;
    }

    button {
      background: #22c55e;
      border: none;
      cursor: pointer;
      color: white;
      width: auto;
    }

    #result {
      margin-top: 20px;
      background: #020617;
      padding: 20px;
      border-radius: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<h1>Offerte Generator</h1>

<input id="klant" placeholder="Klantnaam">
<input id="bedrijf" placeholder="Bedrijfsnaam">

<input id="project" placeholder="Type project">
<input id="sector" placeholder="Sector">

<input id="prijs" type="number" placeholder="Prijs €">
<input id="extra" placeholder="Extra info">

<select id="stijl">
  <option value="zakelijk">Zakelijk</option>
  <option value="warm">Warm</option>
  <option value="sales">Sales</option>
</select>

<button onclick="genereer()">Genereer offerte</button>

<div id="result"></div>

<script>
async function genereer() {
  const klant = document.getElementById('klant').value;
  const bedrijf = document.getElementById('bedrijf').value;
  const project = document.getElementById('project').value;
  const sector = document.getElementById('sector').value;
  const prijs = document.getElementById('prijs').value;
  const extra = document.getElementById('extra').value;
  const stijl = document.getElementById('stijl').value;

  if (!project || !sector || !prijs) {
    alert("Vul alles in");
    return;
  }

  document.getElementById('result').innerText = "Genereren...";

  const prompt = `
Schrijf een professionele offerte.

Klant: ${klant}
Bedrijf: ${bedrijf}
Project: ${project}
Sector: ${sector}
Prijs: €${prijs}
Extra: ${extra}

Stijl: ${stijl}

Kort, duidelijk, overtuigend.
`;

  try {
    const res = await fetch('/api/scrolltax', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });

    const text = await res.text();
    document.getElementById('result').innerText = text;

  } catch (e) {
    document.getElementById('result').innerText = "Fout bij genereren";
  }
}
</script>

</body>
</html>
